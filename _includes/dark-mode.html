<style>
body.dark-mode {
  background-color: #1e1e1e;
  color: #e0e0e0;
}

body.dark-mode code {
  background-color: #2d2d2d !important;
  color: #e0e0e0 !important;
}

body.dark-mode pre {
  background-color: #2d2d2d !important;
  color: #e0e0e0 !important;
}

body.dark-mode table {
  color: #e0e0e0 !important;
  border-color: #444 !important;
}

body.dark-mode tbody tr:nth-child(odd) {
  background-color: #252525 !important;
}

body.dark-mode tbody tr:nth-child(even) {
  background-color: #2d2d2d !important;
}

body.dark-mode th {
  background-color: #2d2d2d !important;
  color: #e0e0e0 !important;
  border-color: #444 !important;
}

body.dark-mode td {
  color: #e0e0e0 !important;
  border-color: #444 !important;
}

body.dark-mode a {
  color: #66b3ff !important;
}

body.dark-mode a:visited {
  color: #b399d8 !important;
}

body.dark-mode .dark-mode-toggle {
  color: #ffffff;
}

body.dark-mode h1,
body.dark-mode h2,
body.dark-mode h3,
body.dark-mode h4,
body.dark-mode h5,
body.dark-mode h6 {
  color: #e0e0e0 !important;
}

body.dark-mode .site-nav {
  background-color: #1e1e1e !important;
}

body.dark-mode .site-nav .trigger {
  background-color: #1e1e1e !important;
}

.dark-mode-toggle {
  position: fixed;
  top: 8px;
  right: 20px;
  background: none;
  border: none;
  font-size: 40px;
  cursor: pointer;
  z-index: 1000;
}

/* Mobile devices */
@media (max-width: 600px) {
  .dark-mode-toggle {
    top: auto;
    bottom: 20px;
    right: 20px;
  }
}
</style>

<button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle dark mode" id="darkModeBtn">☽</button>

<script>
function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('darkMode', isDark);
  document.getElementById('darkModeBtn').textContent = isDark ? '☼' : '☽';
}

// Load saved preference on page load
if (localStorage.getItem('darkMode') === 'true') {
  document.body.classList.add('dark-mode');
  document.getElementById('darkModeBtn').textContent = '☼';
}
</script>
